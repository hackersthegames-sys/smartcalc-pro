<!-- History Overlay Panel -->
<div class="absolute inset-0 bg-surface-container/95 glass-panel z-50 translate-y-full transition-transform duration-500 flex flex-col" id="history-panel">
<div class="p-6 flex items-center justify-between border-b border-outline-variant/30">
<h2 class="font-headline-md text-headline-md text-on-surface">History</h2>
<button class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-surface-variant" data-icon="close" id="close-history">close</button>
</div>
<div class="flex-1 overflow-y-auto p-6 custom-scrollbar flex flex-col gap-4" id="history-list">
<!-- History Items Inject Here -->
<p class="text-on-surface-variant text-center mt-10">No recent calculations</p>
</div>
<div class="p-6">
<button class="w-full py-3 rounded-xl bg-surface-container-highest text-on-surface-variant font-label-md hover:text-error transition-colors" id="clear-history">Clear History</button>
</div>
</div>
</div>
<script>
        // --- Calculator Logic ---
        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');
        const modeToggle = document.getElementById('mode-toggle');
        const scientificPanel = document.getElementById('scientific-panel');
        const historyPanel = document.getElementById('history-panel');
        const historyList = document.getElementById('history-list');
        const memoryIndicator = document.getElementById('memory-indicator');
        
        let currentExpression = '';
        let lastResult = '';
        let isResultDisplayed = false;
        let memoryValue = 0;
        let history = JSON.parse(localStorage.getItem('calc_history') || '[]');

        function updateDisplay() {
            expressionEl.textContent = currentExpression;
            resultEl.textContent = lastResult || '0';
        }

        function hapticFeedback() {
            if (window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Event Delegation for keypad
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.calc-button');
            if (!btn) return;
            
            hapticFeedback();

            const val = btn.getAttribute('data-val');
            
            if (val) {
                if (isResultDisplayed && !isNaN(val)) {
                    currentExpression = val;
                    isResultDisplayed = false;
                } else if (isResultDisplayed && isNaN(val)) {
                    currentExpression = lastResult + val;
                    isResultDisplayed = false;
                } else {
                    currentExpression += val;
                }
                
                // Real-time calculation preview
                try {
                    const cleanExpr = currentExpression.replace(/×/g, '*').replace(/÷/g, '/');
                    // Simple sanitzation & safety for real-time (basic eval check)
                    if (currentExpression && !isNaN(currentExpression.slice(-1))) {
                        lastResult = evalSafe(currentExpression);
                    }
                } catch (err) {}
                
                updateDisplay();
            }
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            currentExpression = '';
            lastResult = '';
            isResultDisplayed = false;
            updateDisplay();
        });

        document.getElementById('backspace-btn').addEventListener('click', () => {
            currentExpression = currentExpression.slice(0, -1);
            updateDisplay();
        });

        document.getElementById('equals-btn').addEventListener('click', () => {
            if (!currentExpression) return;
            try {
                const finalResult = evalSafe(currentExpression);
                
                // Save to history
                if (currentExpression !== finalResult) {
                    history.unshift({ expr: currentExpression, res: finalResult });
                    history = history.slice(0, 50); // Keep last 50
                    localStorage.setItem('calc_history', JSON.stringify(history));
                }

                currentExpression = '';
                lastResult = finalResult.toString();
                isResultDisplayed = true;
                updateDisplay();
            } catch (err) {
                lastResult = 'Error';
                updateDisplay();
            }
        });

        function evalSafe(expr) {
            try {
                // Replacing visual chars with math ones
                let processed = expr
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/sqrt\(/g, 'Math.sqrt(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(');

                // Use a Function constructor instead of eval for slightly better practice
                const result = new Function(`return ${processed}`)();
                
                if (!isFinite(result)) return 'Division by Zero';
                
                // Handle float precision
                return parseFloat(result.toFixed(8)).toString();
            } catch (e) {
                return 'Error';
            }
        }

        // --- UI Interactions ---
        modeToggle.addEventListener('click', () => {
            scientificPanel.classList.toggle('expanded');
            modeToggle.classList.toggle('bg-primary-container');
            modeToggle.classList.toggle('text-on-primary-container');
        });

        document.getElementById('history-btn').addEventListener('click', () => {
            renderHistory();
            historyPanel.classList.remove('translate-y-full');
        });

        document.getElementById('close-history').addEventListener('click', () => {
            historyPanel.classList.add('translate-y-full');
        });

        document.getElementById('clear-history').addEventListener('click', () => {
            history = [];
            localStorage.setItem('calc_history', '[]');
            renderHistory();
        });

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = `<p class="text-on-surface-variant text-center mt-10">No recent calculations</p>`;
                return;
            }
            historyList.innerHTML = history.map((item, idx) => `
                <div class="history-item group cursor-pointer p-4 rounded-2xl bg-surface-container-low hover:bg-surface-variant transition-colors" data-expr="${item.expr}">
                    <div class="text-on-surface-variant text-label-md mb-1">${item.expr}</div>
                    <div class="text-on-surface text-headline-md text-right font-bold">= ${item.res}</div>
                </div>
            `).join('');

            // Click history to restore
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentExpression = item.getAttribute('data-expr');
                    isResultDisplayed = false;
                    updateDisplay();
                    historyPanel.classList.add('translate-y-full');
                });
            });
        }

        // Memory Functions
        window.handleMemory = function(type) {
            hapticFeedback();
            const currentVal = parseFloat(lastResult) || 0;
            switch(type) {
                case 'MC':
                    memoryValue = 0;
                    memoryIndicator.classList.add('opacity-0');
                    break;
                case 'MR':
                    currentExpression += memoryValue.toString();
                    updateDisplay();
                    break;
                case 'M+':
                    memoryValue += currentVal;
                    memoryIndicator.classList.remove('opacity-0');
                    break;
                case 'M-':
                    memoryValue -= currentVal;
                    memoryIndicator.classList.remove('opacity-0');
                    break;
            }
        };

        // Long press result to copy
        resultEl.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            navigator.clipboard.writeText(resultEl.textContent).then(() => {
                alert('Copied to clipboard');
            });
        });

        // Initialize display
        updateDisplay();
    </script>
</body></html>
